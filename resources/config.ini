[General]
# pick your favorite image viewer
PreferredImageViewer = auto
LibraryPath = auto

# int or css value string like 90%%
# (escape percent with double percent %%)
MaxTextWidth = 80

# 'justify', 'center', 'left', 'right'
TextJustification = justify

# currently using pretty=yes is slow
# and taking huge amount of memory
Pretty = no

PageScrollDuration = 0.2

# auto, kitty, ansi, or placeholder
# oversized, animated, or corrupt images are shown as placeholders
# PDF fixed-page rendering follows this mode; press v for reflowable text
ImageMode = auto

# colors accept #rgb, #rrggbb, or common names
[Color Dark]
Background = #1e1e2e
Foreground = #cdd6f4
Accent = #cba6f7

[Color Light]
Background = #eff1f5
Foreground = #4c4f69
Accent = #8839ef

[Keymaps]
ToggleLightDark = c
TogglePdfView = v
ScrollDown = down,j
ScrollUp = up,k
PageDown = ctrl+f,pagedown,l,space
PageUp = ctrl+b,pageup,h
Home = home,gg
End = end,G
OpenToc = tab
AddBookmark = b
OpenBookmarks = B
OpenMetadata = M
OpenHelp = f1
SearchForward = slash
SearchBackward = question_mark
NextMatch = n
PreviousMatch = N
Confirm = enter
CloseOrQuit = q,escape
Screenshot = f12
